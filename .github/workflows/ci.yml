name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check app ui scripts src project_paths.py tests

      - name: Ruff format check
        run: uv run ruff format --check app ui scripts src project_paths.py tests

      - name: Run tests if present
        shell: bash
        run: |
          if [ -d tests ]; then
            uv run pytest -q
          else
            echo "No tests directory found, skipping pytest."
          fi

      - name: Build API image
        run: docker build -f Dockerfile.api -t projet12-api:ci .

      - name: Build UI image
        run: docker build -f Dockerfile.ui -t projet12-ui:ci .